services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trello_clone
      POSTGRES_USER: trello
      POSTGRES_PASSWORD: trello
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trello -d trello_clone"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/trello_clone
      DB_USERNAME: trello
      DB_PASSWORD: trello
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
