spring:
  application:
    name: trello-clone-backend
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/trello_clone}
    username: ${DB_USERNAME:trello}
    password: ${DB_PASSWORD:trello}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:dev-only-jwt-signing-secret-please-override-in-prod-env-1234567890}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  attachments:
    storage-path: ${ATTACHMENTS_STORAGE_PATH:./data/attachments}

springdoc:
  api-docs:
    path: /api/docs/openapi.json

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:trello_clone;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  h2:
    console:
      enabled: true
      path: /h2-console
logging:
  level:
    ru.trelloclone: DEBUG
